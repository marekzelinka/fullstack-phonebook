# fly.toml app configuration file generated for fullstack-phonebook-prod on 2026-04-26T15:28:26+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fullstack-phonebook-prod'
primary_region = 'ams'

[env]
PORT = "3001"

[http_service]
internal_port = 3001
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
timeout = "5s"
path = "/api/health"

[[vm]]
memory = '1gb'
cpus = 1
memory_mb = 1024
